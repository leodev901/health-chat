name: backend > ci and push GHCR

on:
  push:
    branches: ["main"]
    paths:
      - "backend/Dockerfile"
      - "backend/requirements.txt"
      - "helm/backend/**"
      - ".github/workflows/backend-ci.yaml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Registry Image Tag name (default: latest)"
        required: false
        default: "latest"

permissions:
  contents: write
  packages: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set values
        run: |
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            echo "TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_ENV
          else
            echo "TAG=latest" >> $GITHUB_ENV
          fi
      
      - name: set Github secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          -e "s|replace-openai-api-key|$OPENAI_API_KEY|g" \
          -e "s|replace-gemini-api-key|$GEMINI_API_KEY|g" \
          helm/backend/values.yaml 



      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
